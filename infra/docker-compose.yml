version: "3.9"

# VenueFlow local development infrastructure
# Starts: PostgreSQL, TimescaleDB, Redis, Kafka (KRaft mode)

networks:
  venueflow:
    driver: bridge

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  kafka_data:

services:
  # ── PostgreSQL (primary app database) ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: venueflow-postgres
    environment:
      POSTGRES_USER: venueflow
      POSTGRES_PASSWORD: venueflow_dev
      POSTGRES_DB: venueflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - venueflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venueflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── TimescaleDB (time-series sensor data) ──────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: venueflow-timescaledb
    environment:
      POSTGRES_USER: venueflow
      POSTGRES_PASSWORD: venueflow_dev
      POSTGRES_DB: venueflow_ts
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - venueflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venueflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (pub/sub, caching, session state) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: venueflow-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - venueflow
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode — no ZooKeeper) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: venueflow-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      # KRaft settings
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Cluster ID (must be a valid base64-encoded UUID)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_MS: 604800000  # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - venueflow
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Kafka topic initializer (runs once then exits) ─────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: venueflow-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./kafka/init-topics.sh:/init-topics.sh:ro
    entrypoint: ["/bin/bash", "/init-topics.sh"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    networks:
      - venueflow
    restart: "no"
